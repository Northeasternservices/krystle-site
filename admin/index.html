<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: #0d0b0c; color: #f0ece8; overflow: hidden; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(240,236,232,0.12); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(240,236,232,0.22); }

  /* Date/time inputs */
  input[type="date"], input[type="time"] { color-scheme: dark; }

  select option { background: #1e1a1c; color: #f0ece8; }

  button { font-family: 'Jost', sans-serif; }

  /* ── Mobile: hide sidebar, show bottom nav ── */
  @media (max-width: 768px) {
    body { overflow: auto; }

    /* Sidebar collapses to bottom nav */
    [data-sidebar] {
      position: fixed !important;
      bottom: 0 !important; top: auto !important;
      left: 0 !important; right: 0 !important;
      width: 100% !important;
      height: 60px !important;
      flex-direction: row !important;
      z-index: 100;
      border-right: none !important;
      border-top: 1px solid rgba(240,236,232,0.08) !important;
    }

    /* Hide logo + bottom links on mobile */
    [data-sidebar-logo], [data-sidebar-bottom] { display: none !important; }

    /* Nav becomes horizontal scroll */
    [data-sidebar-nav] {
      display: flex !important;
      flex-direction: row !important;
      overflow-x: auto !important;
      padding: 0 8px !important;
      align-items: center !important;
      width: 100% !important;
      gap: 0 !important;
      scrollbar-width: none;
    }
    [data-sidebar-nav]::-webkit-scrollbar { display: none; }

    /* Nav buttons compact */
    [data-sidebar-nav] button {
      flex-direction: column !important;
      gap: 3px !important;
      padding: 6px 10px !important;
      min-width: 56px !important;
      font-size: 9px !important;
      letter-spacing: 0.05em !important;
      margin-bottom: 0 !important;
      border-radius: 0 !important;
    }

    /* Main content gets bottom padding for nav */
    #root > div > main {
      padding-bottom: 68px !important;
      overflow-y: auto !important;
    }
  }

</style>
