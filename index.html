<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0a0b;
    --bg2: #120f10;
    --fg: #f0ece8;
    --fg-muted: rgba(240,236,232,0.5);
    --pink: oklch(0.72 0.14 352);
    --pink-deep: oklch(0.52 0.18 352);
    --pink-faint: oklch(0.72 0.14 352 / 0.12);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Jost', sans-serif;
    --border: rgba(240,236,232,0.1);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-weight: 300;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.35;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    background: linear-gradient(to bottom, rgba(12,10,11,0.95) 0%, transparent 100%);
    backdrop-filter: blur(2px);
  }

  .nav-logo {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--fg);
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }

  .nav-links a {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-muted);
    text-decoration: none;
    transition: color 0.3s;
  }

  .nav-links a:hover { color: var(--pink); }

  .nav-book {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--pink);
    padding: 10px 24px;
    text-decoration: none;
    transition: background 0.3s, transform 0.2s;
  }

  .nav-book:hover { background: var(--pink-deep); transform: translateY(-1px); }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    padding: 120px 24px 80px;
    overflow: hidden;
  }

  .hero-bg-circle {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, oklch(0.52 0.18 352 / 0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .hero-eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s ease forwards;
  }

  .hero-title {
    font-family: var(--serif);
    font-size: clamp(72px, 11vw, 148px);
    font-weight: 300;
    line-height: 0.92;
    letter-spacing: -0.01em;
    color: var(--fg);
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.9s 0.4s ease forwards;
  }

  .hero-title em {
    font-style: italic;
    color: var(--pink);
  }

  .hero-amp {
    font-style: italic;
    font-size: 0.85em;
    color: var(--fg-muted);
  }

  .hero-subtitle {
    font-family: var(--sans);
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-top: 28px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.9s 0.6s ease forwards;
  }

  .hero-ctas {
    display: flex;
    gap: 16px;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.9s 0.8s ease forwards;
  }

  .btn-primary {
    display: inline-block;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--pink);
    padding: 16px 40px;
    text-decoration: none;
    transition: background 0.3s, transform 0.2s;
  }

  .btn-primary:hover { background: var(--pink-deep); transform: translateY(-2px); }

  .btn-ghost {
    display: inline-block;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 16px 40px;
    text-decoration: none;
    transition: border-color 0.3s, color 0.3s, transform 0.2s;
  }

  .btn-ghost:hover { border-color: var(--pink); color: var(--pink); transform: translateY(-2px); }

  .hero-divider {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 1s 1.2s ease forwards;
  }

  .hero-divider span {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--pink), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }

  /* ─── SECTION BASE ─── */
  section {
    padding: 120px 48px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-full {
    max-width: none;
    background: var(--bg2);
  }

  .section-full > .inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 120px 48px;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 60px;
  }

  .section-label span {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--pink);
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    max-width: 200px;
  }

  .section-heading {
    font-family: var(--serif);
    font-size: clamp(40px, 5vw, 64px);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .section-heading em { font-style: italic; color: var(--pink); }

  /* ─── SERVICES ─── */
  .services-intro {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: end;
    margin-bottom: 80px;
  }

  .services-tagline {
    font-family: var(--sans);
    font-size: 14px;
    color: var(--fg-muted);
    line-height: 1.8;
    max-width: 400px;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .service-card {
    background: var(--bg);
    padding: 48px 36px;
    transition: background 0.4s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 2px;
    background: var(--pink);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }

  .service-card:hover { background: var(--bg2); }
  .service-card:hover::before { transform: scaleX(1); }

  .service-number {
    font-family: var(--serif);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--pink);
    margin-bottom: 20px;
    display: block;
  }

  .service-name {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .service-desc {
    font-size: 13px;
    color: var(--fg-muted);
    line-height: 1.8;
    margin-bottom: 24px;
  }

  .service-divider {
    width: 32px;
    height: 1px;
    background: var(--border);
    margin-bottom: 20px;
  }

  .service-price {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--fg-muted);
  }

  .service-price strong {
    color: var(--fg);
    font-weight: 400;
  }

  /* ─── ABOUT ─── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .about-image-wrap {
    position: relative;
    aspect-ratio: 3/4;
  }

  .about-image-placeholder {
    width: 100%;
    height: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .about-image-placeholder span {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  /* Striped placeholder pattern */
  .about-image-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(240,236,232,0.02) 10px,
      rgba(240,236,232,0.02) 20px
    );
  }

  .about-accent-box {
    position: absolute;
    bottom: -24px;
    right: -24px;
    width: 120px;
    height: 120px;
    border: 1px solid var(--pink);
    z-index: -1;
  }

  .about-text p {
    font-size: 15px;
    color: var(--fg-muted);
    line-height: 1.9;
    margin-bottom: 20px;
  }

  .about-text p:first-of-type {
    font-family: var(--serif);
    font-size: 22px;
    font-style: italic;
    color: var(--fg);
    line-height: 1.6;
    font-weight: 300;
  }

  .about-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--border);
    padding: 12px 20px;
    margin-top: 20px;
  }

  .about-badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--pink);
    flex-shrink: 0;
  }

  .about-badge span {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  /* ─── BOOKING / CONTACT ─── */
  .booking-wrap {
    text-align: center;
    max-width: 680px;
    margin: 0 auto;
  }

  .booking-wrap p {
    font-size: 15px;
    color: var(--fg-muted);
    line-height: 1.9;
    margin: 24px 0 48px;
  }

  .booking-meta {
    display: flex;
    justify-content: center;
    gap: 64px;
    margin-top: 64px;
    padding-top: 48px;
    border-top: 1px solid var(--border);
  }

  .booking-meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .booking-meta-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--pink);
  }

  .booking-meta-value {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 300;
  }

  /* ─── FOOTER ─── */
  footer {
    border-top: 1px solid var(--border);
    padding: 40px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-logo {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.06em;
  }

  .footer-copy {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--fg-muted);
  }

  .footer-tagline {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  .social-links {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .social-link {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    color: var(--fg-muted);
    text-decoration: none;
    transition: border-color 0.3s, color 0.3s, transform 0.2s;
  }

  .social-link:hover {
    border-color: var(--pink);
    color: var(--pink);
    transform: translateY(-2px);
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes scrollPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ─── TWEAKS PANEL ─── */
  .tweaks-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 500;
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 24px;
    min-width: 260px;
    display: none;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .tweaks-panel.open { display: flex; }

  .tweaks-title {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 4px;
  }

  .tweak-row { display: flex; flex-direction: column; gap: 8px; }

  .tweak-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  .tweak-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tweak-btn {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.12em;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .tweak-btn:hover, .tweak-btn.active {
    background: var(--pink);
    border-color: var(--pink);
    color: var(--bg);
  }

  /* ─── MOBILE ─── */
  @media (max-width: 768px) {
    nav { padding: 20px 24px; }
    .nav-links { display: none; }

    .hero-title { font-size: 64px; }

    section { padding: 80px 24px; }
    .section-full > .inner { padding: 80px 24px; }

    .services-intro { grid-template-columns: 1fr; gap: 24px; }
    .services-grid { grid-template-columns: 1fr; }
    .about-grid { grid-template-columns: 1fr; gap: 48px; }

    .booking-meta { gap: 32px; }
    #contact-section .inner > div > div:last-child { grid-template-columns: 1fr; gap: 32px; }

    footer { flex-direction: column; gap: 16px; text-align: center; }

    .about-accent-box { display: none; }
  }
</style>
</head>
