<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krystle & Co — Mobile Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0c0a0b;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 48px 24px 64px;
    font-family: 'Jost', sans-serif;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.3;
    z-index: 0;
  }
  .stage {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  .stage-label {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: oklch(0.72 0.14 352);
  }
  .device-wrap {
    filter: drop-shadow(0 40px 80px rgba(0,0,0,0.6));
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const pink = 'oklch(0.72 0.14 352)';
const pinkDeep = 'oklch(0.52 0.18 352)';
const bg = '#0c0a0b';
const bg2 = '#120f10';
const fg = '#f0ece8';
const fgMuted = 'rgba(240,236,232,0.5)';
const border = 'rgba(240,236,232,0.1)';
const serif = "'Cormorant Garamond', Georgia, serif";
const sans = "'Jost', sans-serif";

const services = [
  { name: "Classic Lashes", desc: "Natural, defined. One extension per lash.", detail: "Fill every 2–3 weeks" },
  { name: "Hybrid Lashes", desc: "Textured, wispy blend of classic & volume.", detail: "Fill every 2–3 weeks" },
  { name: "Volume Lashes", desc: "Dramatic, full, fluffy fans.", detail: "Fill every 2–3 weeks" },
  { name: "Lash Lift & Tint", desc: "Lift and darken your natural lashes.", detail: "Lasts 6–8 weeks" },
  { name: "Brow Henna", desc: "Semi-permanent tinting, skin & hair.", detail: "Lasts 2–4 weeks" },
  { name: "Brow Lamination", desc: "Brushed-up, fluffy restructured brows.", detail: "Lasts 6–8 weeks" },
];

function MobileApp() {
  const [section, setSection] = useState('home');

  return (
    <div style={{ background: bg, height: '100%', color: fg, fontFamily: sans, fontWeight: 300, overflowY: 'auto', position: 'relative' }}>
      {/* Sticky nav */}
      <div style={{
        position: 'sticky', top: 0, zIndex: 50,
        background: 'rgba(12,10,11,0.92)', backdropFilter: 'blur(12px)',
        padding: '16px 20px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        borderBottom: `1px solid ${border}`,
      }}>
        <span style={{ fontFamily: serif, fontSize: 18, letterSpacing: '0.04em' }}>
          Krystle <em style={{ fontStyle: 'italic', color: pink }}>&amp; Co</em>
        </span>
        <a href="https://lashedbeauty.glossgenius.com" target="_blank" rel="noopener" style={{
          fontFamily: sans, fontSize: 10, fontWeight: 500,
          letterSpacing: '0.2em', textTransform: 'uppercase',
          color: bg, background: pink,
          padding: '8px 16px', textDecoration: 'none',
        }}>
          Book
        </a>
      </div>

      {/* HERO */}
      <div style={{
        minHeight: 480, display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center', textAlign: 'center',
        padding: '60px 24px 48px', position: 'relative', overflow: 'hidden',
      }}>
        {/* glow */}
        <div style={{
          position: 'absolute', width: 400, height: 400, borderRadius: '50%',
          background: `radial-gradient(circle, ${pinkDeep}22 0%, transparent 70%)`,
          top: '50%', left: '50%', transform: 'translate(-50%,-50%)',
          pointerEvents: 'none',
        }} />
        <div style={{ fontSize: 10, letterSpacing: '0.35em', textTransform: 'uppercase', color: pink, marginBottom: 20 }}>
          Ashland, MA
        </div>
        <h1 style={{ fontFamily: serif, fontSize: 72, fontWeight: 300, lineHeight: 0.9, letterSpacing: '-0.01em', marginBottom: 8 }}>

        <p style={{ fontSize: 10, letterSpacing: '0.25em', textTransform: 'uppercase', color: fgMuted, margin: '20px 0 36px' }}>

        </p>
        <a href="https://lashedbeauty.glossgenius.com" target="_blank" rel="noopener" style={{
          display: 'inline-block', fontFamily: sans, fontSize: 10, fontWeight: 500,
          letterSpacing: '0.22em', textTransform: 'uppercase',
          color: bg, background: pink, padding: '14px 32px', textDecoration: 'none',
        }}>
          Book Your Appointment
        </a>
      </div>

      {/* Divider line */}
      <div style={{ height: 1, background: border, margin: '0 24px' }} />

      {/* SERVICES */}

        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 32 }}>

          <div style={{ flex: 1, height: 1, background: border, maxWidth: 120 }} />
        </div>
        <h2 style={{ fontFamily: serif, fontSize: 38, fontWeight: 300, lineHeight: 1.1, marginBottom: 32 }}>
          Crafted with <em style={{ fontStyle: 'italic', color: pink }}>precision</em>
        </h2>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 1, background: border, border: `1px solid ${border}` }}>
          {services.map((svc, i) => (
            <div key={i} style={{
              background: bg, padding: '28px 24px',
              borderTop: i === 0 ? 'none' : `1px solid ${border}`,

              <span style={{ fontSize: 9, letterSpacing: '0.2em', color: pink, display: 'block', marginBottom: 10 }}>0{i+1}</span>

              <div style={{ width: 24, height: 1, background: border, marginBottom: 10 }} />
              <span style={{ fontSize: 11, color: fgMuted }}>{svc.detail}</span>
            </div>
          ))}
        </div>
        <p style={{ fontSize: 11, color: pink, letterSpacing: '0.1em', marginTop: 20 }}>Contact for current pricing →</p>
      </div>

      {/* ABOUT */}
      <div style={{ background: bg2, padding: '48px 24px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 32 }}>
          <span style={{ fontSize: 9, letterSpacing: '0.35em', textTransform: 'uppercase', color: pink }}>About</span>
          <div style={{ flex: 1, height: 1, background: border, maxWidth: 120 }} />
        </div>
        {/* Photo placeholder */}
        <div style={{
          width: '100%', aspectRatio: '4/3', background: bg,
          border: `1px solid ${border}`, marginBottom: 32,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 10,
          position: 'relative', overflow: 'hidden',
        }}>
          <div style={{
            position: 'absolute', inset: 0,
            backgroundImage: 'repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(240,236,232,0.02) 10px,rgba(240,236,232,0.02) 20px)',
          }} />
          <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="14" r="7" stroke="rgba(240,236,232,0.2)" strokeWidth="1.5"/>
            <path d="M6 38c0-7.732 6.268-14 14-14s14 6.268 14 14" stroke="rgba(240,236,232,0.2)" strokeWidth="1.5"/>
          </svg>
          <span style={{ fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase', color: fgMuted }}>Your photo here</span>
        </div>
        <h2 style={{ fontFamily: serif, fontSize: 38, fontWeight: 300, lineHeight: 1.1, marginBottom: 24 }}>
          Meet <em style={{ fontStyle: 'italic', color: pink }}>Krystle</em>
        </h2>
        <p style={{ fontFamily: serif, fontSize: 18, fontStyle: 'italic', color: fg, lineHeight: 1.6, marginBottom: 16 }}>
          "I believe every person deserves to feel confident and beautiful — every single day."
        </p>
        <p style={{ fontSize: 13, color: fgMuted, lineHeight: 1.9, marginBottom: 12 }}>
          Based in Ashland, MA, Krystle &amp; Co is a woman-owned lash and brow studio delivering studio-quality results in a warm, welcoming environment.
        </p>
        <div style={{
          display: 'inline-flex', alignItems: 'center', gap: 10,
          border: `1px solid ${border}`, padding: '10px 16px', marginTop: 8,
        }}>
          <div style={{ width: 6, height: 6, borderRadius: '50%', background: pink, flexShrink: 0 }} />
          <span style={{ fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase', color: fgMuted }}>
            Woman Owned · Ashland, MA
          </span>
        </div>
      </div>

      {/* BOOKING */}
      <div style={{ padding: '48px 24px', textAlign: 'center' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12, marginBottom: 32 }}>
          <span style={{ fontSize: 9, letterSpacing: '0.35em', textTransform: 'uppercase', color: pink }}>Booking</span>
        </div>
        <h2 style={{ fontFamily: serif, fontSize: 38, fontWeight: 300, lineHeight: 1.1, marginBottom: 16 }}>
          Ready to <em style={{ fontStyle: 'italic', color: pink }}>transform</em> your look?
        </h2>
        <p style={{ fontSize: 13, color: fgMuted, lineHeight: 1.9, marginBottom: 36 }}>
          Book online — choose your service, pick a time, and we'll take care of the rest.
        </p>
        <a href="https://lashedbeauty.glossgenius.com" target="_blank" rel="noopener" style={{
          display: 'inline-block', fontFamily: sans, fontSize: 11, fontWeight: 500,
          letterSpacing: '0.2em', textTransform: 'uppercase',
          color: bg, background: pink, padding: '16px 40px', textDecoration: 'none',
        }}>
          Book on GlossGenius
        </a>
        <div style={{ marginTop: 48, paddingTop: 36, borderTop: `1px solid ${border}`, display: 'flex', justifyContent: 'center', gap: 40 }}>
          {[['Location', 'Ashland, MA'], ['Booking', 'Online'], ['Owner', 'Krystle']].map(([label, val]) => (
            <div key={label} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
              <span style={{ fontSize: 9, letterSpacing: '0.3em', textTransform: 'uppercase', color: pink }}>{label}</span>
              <span style={{ fontFamily: serif, fontSize: 16, fontWeight: 300 }}>{val}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Footer */}
      <div style={{
        borderTop: `1px solid ${border}`, padding: '24px',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
        paddingBottom: 48,
      }}>
        <div style={{ fontFamily: serif, fontSize: 18 }}>Krystle <em style={{ fontStyle: 'italic', color: pink }}>&amp; Co</em></div>
        <div style={{ fontSize: 10, letterSpacing: '0.15em', color: fgMuted }}>© 2026 · Ashland, MA</div>
      </div>
    </div>
  );
}

function PreviewStage() {
  return (
    <div className="stage">
      <div className="stage-label">Mobile Preview</div>
      <div className="device-wrap">
        <IOSDevice width={390} height={844} dark={true}>
          <MobileApp />
        </IOSDevice>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PreviewStage />);
</script>
</body>
</html>
